name = "subpilot"
main = "src/hono/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "subpilot"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
JWT_SECRET = "change-this-to-a-random-secret"

[[triggers.crons]]
cron = "0 0 * * *"
