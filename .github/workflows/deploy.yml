name: Deploy to Cloudflare

on:
  push:
    branches: [master]

jobs:
  deploy-backend:
    name: Deploy Workers
    runs-on: ubuntu-latest
    outputs:
      workers_url: ${{ steps.get-url.outputs.url }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm install

      - name: Generate wrangler.toml
        run: |
          cat > wrangler.toml << 'TOML'
          name = "subpilot"
          main = "src/hono/index.ts"
          compatibility_date = "2024-12-01"
          compatibility_flags = ["nodejs_compat"]

          [[d1_databases]]
          binding = "DB"
          database_name = "subpilot"
          database_id = "D1_DATABASE_ID_PLACEHOLDER"

          [[triggers.crons]]
          cron = "0 0 * * *"
          TOML
          sed -i "s/D1_DATABASE_ID_PLACEHOLDER/${{ secrets.D1_DATABASE_ID }}/" wrangler.toml

      - name: Set JWT_SECRET
        run: echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migration
        run: npx wrangler d1 execute subpilot --file=migrations/0001_init.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get Workers URL
        id: get-url
        run: |
          SUBDOMAIN=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/subdomain" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result.subdomain')
          echo "url=https://subpilot.${SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Pages
    needs: deploy-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm install

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.workers_url }}

      - name: Deploy to Pages
        run: npx wrangler pages deploy dist --project-name=subpilot-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
